services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus_bai12
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - node-exporter

  grafana:
    image: grafana/grafana:latest
    container_name: grafana_bai12
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node_exporter_bai12
    restart: always
    ports:
      - "9100:9100"

volumes:
  grafana_data: