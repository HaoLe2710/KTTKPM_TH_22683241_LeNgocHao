services:
  postgres:
    image: postgres:16
    container_name: postgres_bai11
    restart: always
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer
    container_name: adminer_bai11
    restart: always
    depends_on:
      - postgres
    ports:
      - "8083:8080"

volumes:
  postgres_data: