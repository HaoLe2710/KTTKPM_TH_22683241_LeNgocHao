services:
  redis:
    image: redis:alpine
    container_name: voting_redis_bai5
    restart: unless-stopped
    networks:
      - voting-net

  db:
    image: postgres:16-alpine
    container_name: voting_postgres_bai5
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: votesdb
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - voting-net

  vote:
    build: ./vote
    container_name: voting_vote_bai5
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      REDIS_HOST: redis
      OPTION_A: Cats
      OPTION_B: Dogs
    ports:
      - "5000:80"
    networks:
      - voting-net

  result:
    build: ./result
    container_name: voting_result_bai5
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PORT: 5001
      PGHOST: db
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: votesdb
      PGPORT: 5432
    ports:
      - "5001:5001"
    networks:
      - voting-net

  worker:
    build: ./worker
    container_name: voting_worker_bai5
    restart: unless-stopped
    depends_on:
      - redis
      - db
    environment:
      REDIS_HOST: redis
      PGHOST: db
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: votesdb
      PGPORT: 5432
    networks:
      - voting-net

volumes:
  db_data:

networks:
  voting-net:
    driver: bridge
